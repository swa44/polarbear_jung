<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - 융스위치</title>
    <meta name="theme-color" content="#18181b" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, #f5f5f5, #e5e7eb 55%, #d4d4d8);
        color: #111827;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }
      .card {
        width: min(100%, 420px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(17, 24, 39, 0.08);
        border-radius: 24px;
        box-shadow: 0 24px 60px rgba(17, 24, 39, 0.12);
        padding: 28px;
        text-align: center;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: #18181b;
        color: white;
        font-size: 24px;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.6;
        font-size: 15px;
      }
      button {
        margin-top: 22px;
        width: 100%;
        border: 0;
        border-radius: 14px;
        background: #111827;
        color: white;
        font-size: 15px;
        font-weight: 600;
        padding: 14px 16px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">P</div>
      <h1>인터넷 연결을 확인해주세요</h1>
      <p>
        현재 네트워크에 연결되어 있지 않아 페이지를 불러올 수 없습니다.
        연결 후 다시 시도해주세요.
      </p>
      <button onclick="window.location.reload()">다시 시도</button>
    </main>
  </body>
</html>
